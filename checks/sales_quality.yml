checks:
  analytics.orders_enriched:
    completeness:
      - row_count > 0:
          name: orders_enriched_not_empty

    validity:
      - failed rows:
          name: invalid_status_values
          fail query: |
            SELECT order_id, status
            FROM analytics.orders_enriched
            WHERE status NOT IN ('pending', 'completed', 'cancelled')
          samples limit: 10

  analytics.sales_by_rep_daily:
    completeness:
      - row_count > 0:
          name: rep_daily_not_empty

    accuracy:
      - avg(revenue) between 0 and 100000:
          name: avg_revenue_in_reasonable_range_for_mock
