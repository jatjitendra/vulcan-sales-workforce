# Data Product Spec — Sales & Workforce (Vulcan / DataOS 2.0)
# Pacific instance: pacific-051426 | Workspace: ct-sandbox
# Apply: dataos-ctl product apply -f deploy/data_product_spec.yml
# Docs: https://dataos.info/learn/dp_developer_learn_track/create_dp_spec/

name: sales-workforce-jk
version: v1beta
entity: product
type: data
description: Mock employee + sales data product built on Vulcan (DataOS 2.0). Unified SQL models, native validation loop, and semantic REST/GraphQL APIs.

tags:
  - DPDomain.HumanResources
  - DPDomain.Sales
  - DPUsecase.SalesAndWorkforce
  - DPTier.Curated

refs:
  - title: DataOS 2.0 — Building Data Products
    href: https://dataos.info/quick_guides/building_data_product/
  - title: Workspace (ct-sandbox)
    href: https://dataos.info/interfaces/cli/command_reference/#workspace

v1beta:
  data:
    meta:
      title: Sales & Workforce
      sourceCodeUrl: https://pacific-051426.dataos.cloud
      trackerUrl: https://dataos.info/learn/dp_developer_learn_track/deploy_dp_cli/

    collaborators:
      - name: jitendrakumartmdcio
        description: owner

    resource:
      description: Bundle containing Vulcan API, GraphQL, plan workflow, and scanner
      purpose: Data product lifecycle on DataOS 2.0
      refType: dataos
      ref: bundle:v1beta:sales-workforce-bundle-jk

    inputs:
      - refType: depot
        ref: dataos://workspace/seeds/employees.csv
      - refType: depot
        ref: dataos://workspace/seeds/orders.csv

    outputs:
      - refType: dataos
        ref: dataset:warehouse:vulcan__raw:raw__employees
      - refType: dataos
        ref: dataset:warehouse:vulcan__raw:raw__orders
      - refType: dataos
        ref: dataset:warehouse:vulcan__analytics:analytics__orders_enriched
      - refType: dataos
        ref: dataset:warehouse:vulcan__analytics:analytics__sales_by_rep_daily

    ports:
      vulcan_api:
        ref: service:v1:sales-workforce-vulcan-api-jk:ct-sandbox
        refType: dataos
      graphql:
        ref: service:v1:sales-workforce-graphql-jk:ct-sandbox
        refType: dataos
