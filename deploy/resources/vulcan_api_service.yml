# Vulcan API Service — REST / OpenAPI for models & semantics
# Adjust: image, repo URL, env, compute, ingress host for your tenant.

name: sales-workforce-vulcan-api-jk
version: v1
type: service
tags:
  - vulcan
  - sales-workforce
  - data-product
description: Vulcan API for Sales & Workforce data product (models, plan, semantic metadata).
owner: "jitendrakumartmdcio"
layer: user

service:
  servicePort: 8000
  replicas: 1
  logLevel: info
  compute: runnable-default
  ingress:
    enabled: true
    stripPath: true
    noAuthentication: false
    path: /sales-workforce/vulcan
  stack: vulcan:2.0
  stackSpec:
    image: tmdcio/vulcan-postgres:0.228.1.14
    command:
      - vulcan
      - --log-to-stdout
      - api
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
    env:
      PROJECT_PATH: /workspace
      VULCAN_TENANT_ID: ct-sandbox
      VULCAN__TRANSPILER__BASE_URL: http://vulcan-transpiler-api:8100
      VULCAN__GRAPHQL__BASE_URL: http://vulcan-graphql:3000
    repo:
      url: https://github.com/jatjitendra/vulcan-sales-workforce.git
      branch: main
      path: /
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
