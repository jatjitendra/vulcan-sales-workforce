# GraphQL Service — semantic queries for Sales & Workforce
# Depends on Vulcan API. Adjust image/tags for your tenant.

name: sales-workforce-graphql-jk
version: v1
type: service
tags:
  - vulcan
  - graphql
  - sales-workforce
description: GraphQL endpoint for Sales & Workforce semantic layer.
owner: "jitendrakumartmdcio"
layer: user

service:
  servicePort: 3000
  replicas: 1
  logLevel: info
  compute: runnable-default
  ingress:
    enabled: true
    stripPath: true
    noAuthentication: false
    path: /sales-workforce/graphql
  stack: vulcan-graphql:2.0
  stackSpec:
    image: tmdcio/vulcan-graphql:0.228.1.14
    env:
      VULCAN_API_URL: http://sales-workforce-vulcan-api-jk:8000
      VULCAN_TENANT_ID: ct-sandbox
      VULCAN_DB_TYPE: postgres
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
