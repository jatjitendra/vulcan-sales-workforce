# DataOS 2.0 — single-file Vulcan deploy (replaces bundle + service/workflow YAMLs)
# Generate/regenerate: make deploy-yaml
# Pacific: pacific-051426 | Workspace: ct-sandbox
#
# Apply:
#   dataos-ctl context select --name pacific-051426
#   dataos-ctl apply -f deploy/sales-workforce-jk-deploy.yaml -w ct-sandbox
#
# This one resource deploys: git sync, scheduled plan/run workflow, and Vulcan API.
# Docs: https://tmdc-io.github.io/vulcan-book/cli-command/cli/
#
# Depot = registered cloud warehouse (dataos://warehouse?purpose=rw).
# Confirm depot name with admin if different from "warehouse".

version: v1alpha
type: vulcan
name: sales-workforce-jk
description: "Sales analytics data product for Pacific (pacific-051426) / ct-sandbox. Rep performance, revenue KPIs, and business metrics via Vulcan 2.0 semantics."
owner: jitendrakumartmdcio
layer: user
tags:
  - dataproduct
  - sales-workforce
  - vulcan

spec:
  runAsUser: jitendrakumartmdcio
  compute: runnable-default
  engine: postgres

  repo:
    url: https://github.com/jatjitendra/vulcan-sales-workforce.git
    syncFlags:
      - '--ref=main'
      - '--submodules=off'
    baseDir: .
    # secret: ct-sandbox:github-token  # uncomment if private repo

  depots:
    - dataos://warehouse?purpose=rw

  workflow:
    schedule:
      crons:
        - '0 6 * * *'
      endOn: '2027-01-01T00:00:00+00:00'
      timezone: UTC
      concurrencyPolicy: Forbid

    logLevel: INFO
    resource:
      request:
        cpu: "500m"
        memory: "1Gi"
      limit:
        cpu: "2000m"
        memory: "4Gi"

    plan:
      command:
        - vulcan
      arguments:
        - plan
        - --auto-apply
        - --no-prompts
        - --ignore-warnings
    run:
      command:
        - vulcan
      arguments:
        - run
        - --ignore-warnings

  api:
    replicas: 1
    logLevel: INFO
    resource:
      request:
        cpu: "500m"
        memory: "1Gi"
      limit:
        cpu: "2000m"
        memory: "4Gi"
