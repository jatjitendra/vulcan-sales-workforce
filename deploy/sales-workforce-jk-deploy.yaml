# DataOS 2.0 — Vulcan deploy (aligned with practice-insights on Pacific)
# Pacific: pacific-051426 | Workspace / tenant: ct-sandbox
#
# Apply:
#   dataos-ctl context select --name pacific-051426
#   dataos-ctl apply -f deploy/sales-workforce-jk-deploy.yaml -w ct-sandbox

version: v1alpha
type: vulcan
name: sales-workforce-jk
tags:
  - sales-workforce
  - dataproduct
  - spark
  - iceberg
  - lakehouse
description: "Sales analytics data product for Pacific (pacific-051426) / ct-sandbox. Rep performance, revenue KPIs, and business metrics via Vulcan 2.0 semantics."
owner: jitendrakumartmdcio
tenant: ct-sandbox

spec:
  runAsUser: "jitendrakumartmdcio"
  compute: ct-sandbox-compute
  engine: spark

  repo:
    url: https://github.com/jatjitendra/vulcan-sales-workforce.git
    syncFlags:
      - "--ref=main"
      - "--submodules=off"
    baseDir: .
    # Uncomment if private repo (create workspace secret first):
    # secret: ct-sandbox:github-token

  depots:
    - dataos://s3lhdepot?purpose=rw

  workflow:
    type: schedule
    logLevel: INFO
    schedule:
      crons:
        - "0 6 * * *"
      endOn: "2027-01-01T00:00:00-00:00"
      timezone: "UTC"
      concurrencyPolicy: Forbid
    resource:
      driver:
        coreLimit: "2000m"
        cores: 1
        memory: "3G"
      executor:
        coreLimit: "2000m"
        cores: 2
        memory: "4G"
        instances: 2

    migrate:
      command:
        - vulcan
      arguments:
        - migrate
    plan:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - plan
        - --auto-apply
    run:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - run

  api:
    replicas: 1
    logLevel: INFO
    resource:
      request:
        cpu: "250m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "2Gi"

  sparkConf:
    spark.sql.shuffle.partitions: "100"
    spark.sql.adaptive.enabled: "true"
    spark.sql.adaptive.coalescePartitions.enabled: "true"
