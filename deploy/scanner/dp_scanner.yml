# Scanner workflow — registers product metadata to Metis / Data Product Hub
# Pacific instance: pacific-051426 | Workspace: ct-sandbox
# Apply: dataos-ctl apply -f deploy/scanner/dp_scanner.yml -w ct-sandbox
# Docs: https://dataos.info/learn/dp_developer_learn_track/create_dp_spec/

version: v1
name: scan-sales-workforce-dp-jk
type: workflow
tags:
  - scanner
  - data-product
  - sales-workforce
  - vulcan
description: Scan Sales & Workforce data product from Poros and register metadata to Metis / DPH.
owner: jitendrakumartmdcio
layer: user

workflow:
  dag:
    - name: scan-sales-workforce-job
      description: Register sales-workforce-jk data product in Data Product Hub
      spec:
        tags:
          - scanner2
        stack: scanner:2.0
        compute: runnable-default
        stackSpec:
          type: data-product
          sourceConfig:
            config:
              type: DataProduct
              markDeletedDataProducts: true
              dataProductFilterPattern:
                includes:
                  - sales-workforce-jk
