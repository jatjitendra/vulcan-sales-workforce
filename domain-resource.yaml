# DataOS Vulcan resource — Pacific deploy manifest
# Guide: https://tmdc-io.github.io/vulcan-book/guides/deployment_guide/
# Instance: pacific-051426 | Workspace / tenant: ct-sandbox
#
# Apply (Step 4) — CLI v3 (no -w flag; use tenant select -n ct-sandbox):
#   export PATH="$HOME/.dataos/v2/bin:$PATH"
#   dataos-ctl tenant select -n ct-sandbox
#   dataos-ctl login
#   dataos-ctl resource apply -f domain-resource.yaml

version: v1alpha
type: vulcan
name: sales-workforce-jk
tags:
  - sales-workforce
  - dataproduct
  - spark
  - iceberg
  - lakehouse
  - retry-plan-6
description: "Sales analytics data product for Pacific (pacific-051426) / ct-sandbox. Rep performance, revenue KPIs, and business metrics via Vulcan 2.0 semantics."
owner: jitendrakumartmdcio
tenant: ct-sandbox

spec:
  runAsUser: "jitendrakumartmdcio"
  compute: ct-sandbox-compute
  engine: spark

  repo:
    url: https://github.com/jatjitendra/vulcan-sales-workforce.git
    syncFlags:
      - "--ref=main"
      - "--submodules=off"
    # Match practice-insights pattern: <folder>/<...>/vulcan (not ".")
    baseDir: vulcan-sales-workforce/vulcan
    secret: ct-sandbox:github-token

  depots:
    - dataos://s3lhdepot?purpose=rw

  workflow:
    type: schedule
    logLevel: INFO
    schedule:
      crons:
        - "0 6 * * *"
      endOn: "2027-01-01T00:00:00-00:00"
      timezone: "UTC"
      concurrencyPolicy: Forbid
    resource:
      driver:
        coreLimit: "2000m"
        cores: 1
        memory: "3G"
      executor:
        coreLimit: "2000m"
        cores: 2
        memory: "4G"
        instances: 2

    migrate:
      command:
        - vulcan
      arguments:
        - -p
        - /etc/dataos/work/vulcan-sales-workforce/vulcan
        - migrate
    plan:
      command:
        - vulcan
      arguments:
        - -p
        - /etc/dataos/work/vulcan-sales-workforce/vulcan
        - --log-to-stdout
        - plan
        - --auto-apply
    run:
      command:
        - vulcan
      arguments:
        - -p
        - /etc/dataos/work/vulcan-sales-workforce/vulcan
        - --log-to-stdout
        - run

  api:
    replicas: 1
    logLevel: INFO
    resource:
      request:
        cpu: "250m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "2Gi"

  sparkConf:
    spark.sql.shuffle.partitions: "100"
    spark.sql.adaptive.enabled: "true"
    spark.sql.adaptive.coalescePartitions.enabled: "true"
