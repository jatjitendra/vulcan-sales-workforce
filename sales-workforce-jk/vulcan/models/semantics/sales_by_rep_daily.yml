models:
  analytics.sales_by_rep_daily:
    alias: sales_by_rep
    description: Daily completed-order KPIs per sales rep

    dimensions:
      includes:
        - order_date
        - employee_id
        - rep_name
        - rep_department

    measures:
      total_orders:
        type: sum
        expression: "{sales_by_rep.order_count}"
        description: Sum of daily order counts across reps

      total_revenue:
        type: sum
        expression: "{sales_by_rep.revenue}"
        description: Total revenue

      avg_order_value:
        type: avg
        expression: "{sales_by_rep.avg_order_value}"
        description: Average order value
