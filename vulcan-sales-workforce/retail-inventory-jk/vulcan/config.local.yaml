# Local Vulcan — Postgres warehouse + statestore (Docker via Makefile).
# Pacific cloud uses config.yaml (Spark + dataos://s3lhdepot).

discoverable: false
version: 0.1.0
alignment: consumer_aligned

vde: false

name: retail-inventory-jk
display_name: Retail & Inventory (local)
tenant: ct-sandbox
description: Local Postgres stack for Retail & Inventory development and validation.

tags:
  - retail-inventory
  - vulcan
  - local
  - postgres

terms:
  - glossary.data_product

domain: retail_operations

analytics:
  enabled: false

model_defaults:
  dialect: postgres
  start: '2025-01-01'
  cron: '@daily'
  owner: jitendrakumartmdcio

gateways:
  warehouse:
    connection:
      type: postgres
      host: warehouse
      port: 5432
      database: warehouse
      user: vulcan
      password: vulcan

    state_connection:
      type: postgres
      host: statestore
      port: 5432
      database: statestore
      user: vulcan
      password: vulcan

default_gateway: warehouse

notification_targets:
  - type: console
    notify_on:
      - apply_start
      - apply_end
      - apply_failure
      - run_start
      - run_end
      - run_failure
      - check_start
      - check_end
      - check_failure

users:
  - username: jitendrakumartmdcio
    github_username: jatjitendra
    email: jitendranitp24@gmail.com
    type: OWNER
