discoverable: true
version: 0.1.0
alignment: consumer_aligned

vde: false

name: sales-workforce-jk
display_name: Sales & Workforce
tenant: ct-sandbox
description: |
  Sales analytics data product (DataOS 2.0). CSV seeds load into raw.* models;
  Vulcan transforms to analytics.* for rep performance, revenue KPIs, and semantics.

tags:
  - sales-workforce
  - dataproduct
  - spark
  - iceberg
  - lakehouse
  - vulcan

terms:
  - glossary.data_product
  - glossary.lakehouse

domain: sales_operations

analytics:
  enabled: false

model_defaults:
  dialect: spark2
  start: '2025-01-01'
  cron: '@daily'
  owner: jitendrakumartmdcio

gateways:
  default:
    connection:
      type: depot
      address: dataos://s3lhdepot

default_gateway: default

notification_targets:
  - type: console
    notify_on:
      - apply_start
      - apply_end
      - apply_failure
      - run_start
      - run_end
      - run_failure
      - check_start
      - check_end
      - check_failure

