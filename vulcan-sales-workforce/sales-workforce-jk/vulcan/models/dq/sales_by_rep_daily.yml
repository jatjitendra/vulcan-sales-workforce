checks:
  analytics.sales_by_rep_daily:
    completeness:
      - row_count > 0:
          name: rep_daily_not_empty
          attributes:
            description: Model must have at least one row

    accuracy:
      - avg(revenue) between 0 and 100000:
          name: avg_revenue_in_reasonable_range_for_mock
          attributes:
            description: Average revenue within expected mock data range
