models:
  analytics.orders_enriched:
    alias: orders
    description: Enriched orders with rep attributes for sales analytics

    dimensions:
      includes:
        - order_id
        - order_date
        - employee_id
        - rep_name
        - rep_department
        - customer_id
        - amount
        - status

    measures:
      order_count:
        type: count
        expression: "{orders.order_id}"
        description: Total orders

      total_revenue:
        type: sum
        expression: "{orders.amount}"
        description: Total order amount

      avg_order_value:
        type: avg
        expression: "{orders.amount}"
        description: Average order value
