# Cloud Vulcan config — Pacific / ct-sandbox (Spark + s3lhdepot depot)
# Guide: https://tmdc-io.github.io/vulcan-book/guides/deployment_guide/
# tenant: set DATAOS_TENANT_ID=ct-sandbox in environment on Pacific (not a YAML key)
# Local Postgres dev uses config.local.yaml (see Makefile).

name: sales-workforce-jk
display_name: Sales & Workforce
description: "Sales analytics data product for Pacific (pacific-051426) / ct-sandbox. Rep performance, revenue KPIs, and business metrics via Vulcan 2.0 semantics."

discoverable: true
version: 0.1.0
alignment: consumer_aligned

vde: false

tags:
  - sales-workforce
  - dataproduct
  - spark
  - iceberg
  - lakehouse

terms:
  - glossary.data_product

metadata:
  domain: sales_operations
  use_cases:
    - Sales performance tracking
    - Daily revenue reporting
    - Executive KPI dashboards
    - Rep productivity analytics
  limitations:
    - Uses mock seed data (CSV seeds)
    - Scheduled refresh daily at 06:00 UTC
    - Spark / Iceberg lakehouse on s3lhdepot

users:
  - username: jitendrakumartmdcio
    github_username: jatjitendra
    email: jitendranitp24@gmail.com
    type: OWNER

notification_targets:
  - type: console
    notify_on:
      - apply_failure
      - run_failure
      - audit_failure
      - migration_failure
      - check_failure

gateways:
  default:
    connection:
      type: depot
      address: dataos://s3lhdepot

default_gateway: default

model_defaults:
  dialect: spark
  start: "2025-01-01"
  cron: "@daily"
